version: "3.9"

services:
  app:
    image: ghcr.io/your-org/your-app:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    env_file:
      - .env
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${APP_PORT:-8000}/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
