{% extends "base.html" %}

{% block title %}Initial Setup{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <h1 class="auth-title">Initial Setup</h1>
    <p class="auth-subtitle">Create the first admin account to get started.</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/setup" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          autocomplete="username"
          minlength="3"
          required
          autofocus
        />
      </div>

      <div class="form-group">
        <label for="email">Email <span class="label-optional">(optional)</span></label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          autocomplete="new-password"
          minlength="8"
          required
        />
        <span class="form-hint">Minimum 8 characters</span>
      </div>

      <button type="submit" class="btn btn-primary btn-full">Create Admin Account</button>
    </form>
  </div>
</div>
{% endblock %}
